<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonmoon — Design Review &amp; Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="moonmoon-mock.css">
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    * { -webkit-font-smoothing: antialiased; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="mm-data.jsx"></script>
  <script type="text/babel" src="mm-baseline.jsx"></script>
  <script type="text/babel" src="mm-dir1.jsx"></script>
  <script type="text/babel" src="mm-dir2.jsx"></script>
  <script type="text/babel" src="mm-dir3.jsx"></script>
  <script type="text/babel" src="mm-review.jsx"></script>
  <script type="text/babel" src="mm-a-streams.jsx"></script>
  <script type="text/babel" src="mm-a-calendar.jsx"></script>
  <script type="text/babel" src="mm-a-player.jsx"></script>
  <script type="text/babel" src="mm-a-history.jsx"></script>
  <script type="text/babel" src="mm-explore.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="review" title="Read me first" subtitle="Overall design review — strengths, issues, and the plan">
            <DCArtboard id="review-doc" label="Design review" width={840} height={1560}>
              <Review />
            </DCArtboard>
          </DCSection>

          <DCSection id="landing" title="Landing page" subtitle="Same content, new looks — baseline, then three directions to compare">
            <DCArtboard id="baseline" label="Baseline · current design" width={1200} height={900}>
              <Baseline />
            </DCArtboard>
            <DCArtboard id="dir1" label="A · Refined Signal" width={1200} height={900}>
              <Dir1 />
            </DCArtboard>
            <DCArtboard id="dir2" label="B · Editorial Archive" width={1200} height={900}>
              <Dir2 />
            </DCArtboard>
            <DCArtboard id="dir3" label="C · Now Playing" width={1200} height={1000}>
              <Dir3 />
            </DCArtboard>
          </DCSection>

          <DCSection id="dir-a-app" title="Direction A · across the app" subtitle="Refined Signal extended to every surface — same language end to end">
            <DCArtboard id="a-landing" label="Landing" width={1200} height={900}>
              <Dir1 />
            </DCArtboard>
            <DCArtboard id="a-streams" label="Streams" width={1200} height={1000}>
              <AStreams />
            </DCArtboard>
            <DCArtboard id="a-calendar" label="Calendar" width={1200} height={960}>
              <ACalendar />
            </DCArtboard>
            <DCArtboard id="a-player" label="Player" width={1200} height={780}>
              <APlayer />
            </DCArtboard>
            <DCArtboard id="a-history" label="History" width={1200} height={760}>
              <AHistory />
            </DCArtboard>
          </DCSection>

          <DCSection id="nav-study" title="Nav bar · arrangements" subtitle="Layout & ordering options — grouping browse vs. personal, re-homing Random & utilities">
            <DCArtboard id="nav-grouped" label="1 · Grouped pills" width={1200} height={210}>
              <NavGrouped />
            </DCArtboard>
            <DCArtboard id="nav-seg" label="2 · Segmented Browse" width={1200} height={210}>
              <NavSegmented />
            </DCArtboard>
            <DCArtboard id="nav-centered" label="3 · Centered + consolidated" width={1200} height={210}>
              <NavCentered />
            </DCArtboard>
          </DCSection>

          <DCSection id="chap-study" title="Chapters · strip & list" subtitle="Same multi-game stream card — baseline vs. three treatments">
            <DCArtboard id="chap-base" label="Baseline (today)" width={380} height={500}>
              <ChapBaseline />
            </DCArtboard>
            <DCArtboard id="chap-pop" label="A · Strip + popover" width={380} height={620}>
              <ChapStripPop />
            </DCArtboard>
            <DCArtboard id="chap-chips" label="B · Named chips" width={380} height={500}>
              <ChapChips />
            </DCArtboard>
            <DCArtboard id="chap-bars" label="C · Two-bar detail" width={380} height={500}>
              <ChapBars />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
