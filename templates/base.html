<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOONMOON - {% block title %}Games Browser{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script nonce="{{ nonce }}">
    (function () {
      try {
        var t = localStorage.getItem('moonmoon_theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/header.css">
  <link rel="stylesheet" href="/static/css/games.css">
  <link rel="stylesheet" href="/static/css/vods.css">
  <link rel="stylesheet" href="/static/css/player.css">
  <link rel="stylesheet" href="/static/css/calendar.css">
  <link rel="stylesheet" href="/static/css/sync.css">
  <link rel="stylesheet" href="/static/css/landing.css">
  <link rel="stylesheet" href="/static/css/browse.css">
  <link rel="stylesheet" href="/static/css/footer.css">
  <script type="module" src="/static/list-filters.js" nonce="{{ nonce }}"></script>
  <script type="module" src="/static/list-feedback.js" nonce="{{ nonce }}"></script>
  <script type="module" src="/static/vod-cards.js" nonce="{{ nonce }}"></script>
  <script type="module" src="/static/header.js" nonce="{{ nonce }}"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"
          integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"
          nonce="{{ nonce }}"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="header">
    <a href="/" class="logo">
      <svg class="logo-mark" width="26" height="26" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <path d="M38 14a20 20 0 1 0 0 36 16 16 0 0 1 0-36z" fill="currentColor"/>
        <text x="49" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="700" fill="currentColor" text-anchor="middle">2</text>
      </svg>
      Moonmoon
    </a>
    <nav class="header-nav nav-group" aria-label="Browse">
      <a href="/"         class="nav-link{% if active_section.slug() == "home"     %} active{% endif %}"{% if active_section.slug() == "home"     %} aria-current="page"{% endif %}>Home</a>
      <a href="/browse"   class="nav-link{% if active_section.slug() == "browse"   %} active{% endif %}"{% if active_section.slug() == "browse"   %} aria-current="page"{% endif %}>Browse</a>
      <a href="/calendar" class="nav-link{% if active_section.slug() == "calendar" %} active{% endif %}"{% if active_section.slug() == "calendar" %} aria-current="page"{% endif %}>Calendar</a>
      <a href="/history" class="nav-link nav-link-history{% if active_section.slug() == "history" %} active{% endif %}"{% if active_section.slug() == "history" %} aria-current="page"{% endif %}>History</a>
    </nav>
    <div class="header-right">
      <a href="/random" class="btn-random" aria-label="Open a random VOD" title="Random VOD">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
          <circle cx="9" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="9" cy="15" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="15" r="1" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
        </svg>
        <span>Random</span>
      </a>
      <span class="header-sep" aria-hidden="true"></span>
      <a href="/history" class="nav-util{% if active_section.slug() == "history" %} active{% endif %}"{% if active_section.slug() == "history" %} aria-current="page"{% endif %}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l3 2"/>
        </svg>
        <span>History</span>
      </a>
      <button class="icon-btn" id="theme-btn" type="button" aria-label="Toggle theme" title="Toggle theme">
        <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2"/><path d="M12 20v2"/>
          <path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/>
          <path d="M2 12h2"/><path d="M20 12h2"/>
          <path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="icon-btn" id="sync-btn" type="button" aria-label="Cross-device sync settings" title="Cross-device sync">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7"/>
          <polyline points="21 4 21 9 16 9"/>
        </svg>
      </button>
      {% block search %}{% endblock %}
    </div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
  {% include "_footer.html" %}
<script nonce="{{ nonce }}">
(function () {
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.addEventListener('click', function () {
    var html = document.documentElement;
    var isLight = html.getAttribute('data-theme') === 'light';
    if (isLight) {
      html.removeAttribute('data-theme');
      try { localStorage.setItem('moonmoon_theme', 'dark'); } catch (e) {}
    } else {
      html.setAttribute('data-theme', 'light');
      try { localStorage.setItem('moonmoon_theme', 'light'); } catch (e) {}
    }
  });
})();
</script>
<dialog id="sync-dialog" class="sync-dialog">
  <form method="dialog">
    <h2>Sync watch history across devices</h2>
    <p id="sync-status">Not connected. Generate a token and copy it to your other devices.</p>

    <div id="sync-token-block" hidden>
      <label for="sync-token-value">Your sync token:</label>
      <div class="sync-token-row">
        <input id="sync-token-value" type="text" readonly>
        <button type="button" id="sync-copy" class="btn-chip">Copy</button>
      </div>
    </div>

    <div id="sync-import-block" hidden>
      <label for="sync-import-input">Paste a token from another device:</label>
      <div class="sync-token-row">
        <input id="sync-import-input" type="text" autocomplete="off" spellcheck="false" placeholder="ABCDEFGHIJKLMNOPQRSTUVWXYZ">
        <button type="button" id="sync-import-confirm" class="btn-chip btn-primary">Connect</button>
      </div>
    </div>

    <div class="sync-actions">
      <button type="button" id="sync-generate" class="btn-chip btn-primary">Generate new token</button>
      <button type="button" id="sync-import-show" class="btn-chip">Use existing token</button>
      <button type="button" id="sync-disconnect" class="btn-chip btn-danger" hidden>Disconnect this device</button>
    </div>
    <div class="sync-actions sync-actions-end">
      <button type="submit" class="btn-chip">Close</button>
    </div>
  </form>
</dialog>
<script type="module" src="/static/sync.js" nonce="{{ nonce }}"></script>
</body>
</html>
