<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOONMOON - {% block title %}Games Browser{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/header.css">
  <link rel="stylesheet" href="/static/css/games.css">
  <link rel="stylesheet" href="/static/css/vods.css">
  <link rel="stylesheet" href="/static/css/player.css">
  <link rel="stylesheet" href="/static/css/calendar.css">
  <link rel="stylesheet" href="/static/css/sync.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"
          integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
</head>
<body>
  <div class="header">
    <a href="/" class="logo">Moonmoon</a>
    <nav class="header-nav" aria-label="Primary">
      <a href="/"         class="nav-link{% if active_section.slug() == "games"    %} active{% endif %}"{% if active_section.slug() == "games"    %} aria-current="page"{% endif %}>Games</a>
      <a href="/streams"  class="nav-link{% if active_section.slug() == "streams"  %} active{% endif %}"{% if active_section.slug() == "streams"  %} aria-current="page"{% endif %}>Streams</a>
      <a href="/calendar" class="nav-link{% if active_section.slug() == "calendar" %} active{% endif %}"{% if active_section.slug() == "calendar" %} aria-current="page"{% endif %}>Calendar</a>
      <a href="/history"  class="nav-link{% if active_section.slug() == "history"  %} active{% endif %}"{% if active_section.slug() == "history"  %} aria-current="page"{% endif %}>History</a>
    </nav>
    {% block view_title %}{% endblock %}
    <div class="header-right">
      <a href="/random" class="icon-btn" aria-label="Open a random VOD" title="Random VOD">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
          <circle cx="9" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="9" cy="15" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="15" r="1" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <span class="header-sep" aria-hidden="true"></span>
      <button class="icon-btn" id="sync-btn" type="button" aria-label="Cross-device sync settings" title="Cross-device sync">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7"/>
          <polyline points="21 4 21 9 16 9"/>
        </svg>
      </button>
      {% block search %}
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" name="search" placeholder="Search games..."
               hx-get="/games" hx-trigger="input changed delay:300ms"
               hx-target="#games-grid" hx-swap="innerHTML">
      </div>
      {% endblock %}
    </div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
<script>
(function() {
  function applyResumeBars(root) {
    var store;
    try { store = JSON.parse(localStorage.getItem('moonmoon_resume')) || {}; } catch(e) { return; }
    var cards = (root || document).querySelectorAll('.vod-card[data-vod-id]');
    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      var id = card.dataset.vodId;
      var durSecs = parseInt(card.dataset.durationSecs, 10);
      var resume = store[id];
      if (resume && resume.time > 10 && durSecs > 0) {
        var pct = Math.min((resume.time / durSecs) * 100, 100);
        card.classList.add('has-resume');
        var fill = card.querySelector('.resume-bar-fill');
        if (fill) fill.style.width = pct + '%';
      }
    }
  }
  applyResumeBars();
  document.body.addEventListener('htmx:afterSwap', function(e) { applyResumeBars(e.detail.target); });
})();
</script>
<dialog id="sync-dialog" class="sync-dialog">
  <form method="dialog">
    <h2>Sync watch history across devices</h2>
    <p id="sync-status">Not connected. Generate a token and copy it to your other devices.</p>

    <div id="sync-token-block" hidden>
      <label for="sync-token-value">Your sync token:</label>
      <div class="sync-token-row">
        <input id="sync-token-value" type="text" readonly>
        <button type="button" id="sync-copy">Copy</button>
      </div>
    </div>

    <div id="sync-import-block" hidden>
      <label for="sync-import-input">Paste a token from another device:</label>
      <div class="sync-token-row">
        <input id="sync-import-input" type="text" autocomplete="off" spellcheck="false" placeholder="ABCDEFGHIJKLMNOPQRSTUVWXYZ">
        <button type="button" id="sync-import-confirm">Connect</button>
      </div>
    </div>

    <div class="sync-actions">
      <button type="button" id="sync-generate">Generate new token</button>
      <button type="button" id="sync-import-show">Use existing token</button>
      <button type="button" id="sync-disconnect" class="sync-danger" hidden>Disconnect this device</button>
    </div>
    <div class="sync-actions" style="margin-top:12px;justify-content:flex-end;">
      <button type="submit">Close</button>
    </div>
  </form>
</dialog>
<script src="/static/sync.js"></script>
</body>
</html>
