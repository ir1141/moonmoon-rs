<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOONMOON - {% block title %}Games Browser{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <div class="header">
    <a href="/" class="logo">Moonmoon</a>
    <div class="sep"></div>
    <span class="subtitle">{% block view_title %}Games{% endblock %}</span>
    {% block header_actions %}
    <a href="/streams" class="header-btn">All Streams</a>
    <a href="/history" class="header-btn">History</a>
    <a href="/calendar" class="header-btn">Calendar</a>
    {% endblock %}
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" title="Refresh VODs" onclick="refreshVods(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6"/>
          <path d="M2.5 22v-6h6"/>
          <path d="M3.5 12a9 9 0 0 1 14.6-5.4L21.5 8"/>
          <path d="M20.5 12a9 9 0 0 1-14.6 5.4L2.5 16"/>
        </svg>
      </button>
      <a href="/random" class="random-btn" title="Random VOD">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
          <circle cx="9" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="9" cy="15" r="1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="15" r="1" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      {% block search %}
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" name="search" placeholder="Search games..."
               hx-get="/games" hx-trigger="input changed delay:300ms"
               hx-target="#games-grid" hx-swap="innerHTML">
      </div>
      {% endblock %}
    </div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
<script>
function refreshVods(btn) {
  btn.disabled = true;
  btn.classList.add('spinning');
  var start = Date.now();
  fetch('/api/refresh', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var elapsed = Date.now() - start;
      var delay = Math.max(0, 600 - elapsed);
      setTimeout(function() {
        btn.classList.remove('spinning');
        if (data.status === 'refreshed') {
          window.location.reload();
        } else if (data.status === 'unchanged') {
          btn.classList.add('flash-ok');
          setTimeout(function() { btn.classList.remove('flash-ok'); btn.disabled = false; }, 1000);
        } else {
          btn.classList.add('flash-err');
          setTimeout(function() { btn.classList.remove('flash-err'); btn.disabled = false; }, 1000);
        }
      }, delay);
    })
    .catch(function() {
      btn.classList.remove('spinning');
      btn.classList.add('flash-err');
      setTimeout(function() { btn.classList.remove('flash-err'); btn.disabled = false; }, 1000);
    });
}
(function() {
  function applyResumeBars(root) {
    var store;
    try { store = JSON.parse(localStorage.getItem('moonmoon_resume')) || {}; } catch(e) { return; }
    var cards = (root || document).querySelectorAll('.vod-card[data-vod-id]');
    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      var id = card.dataset.vodId;
      var durSecs = parseInt(card.dataset.durationSecs, 10);
      var resume = store[id];
      if (resume && resume.time > 10 && durSecs > 0) {
        var pct = Math.min((resume.time / durSecs) * 100, 100);
        card.classList.add('has-resume');
        var fill = card.querySelector('.resume-bar-fill');
        if (fill) fill.style.width = pct + '%';
      }
    }
  }
  applyResumeBars();
  document.body.addEventListener('htmx:afterSwap', function(e) { applyResumeBars(e.detail.target); });
})();
</script>
</body>
</html>
