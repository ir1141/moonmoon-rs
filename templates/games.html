{% extends "base.html" %}

{% block title %}Games Browser{% endblock %}

{% block search %}
<div class="search-bar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="search" name="search" aria-label="Search games" placeholder="Search games..."
         hx-get="/games" hx-trigger="input changed delay:300ms"
         hx-target="#games-grid" hx-swap="innerHTML">
</div>
{% endblock %}

{% block content %}
<div class="games-view">
  <div class="games-toolbar">
    <div class="stats">{{ games.len() }} games</div>
    <div class="games-filters">
      <select name="sort" class="toolbar-select"
              hx-get="/games" hx-trigger="change"
              hx-target="#games-grid" hx-swap="innerHTML"
              hx-include="[name='search'], [name='from'], [name='to']">
        <option value="most" {% if sort == "most" %}selected{% endif %}>Most streams</option>
        <option value="fewest" {% if sort == "fewest" %}selected{% endif %}>Fewest streams</option>
        <option value="az" {% if sort == "az" %}selected{% endif %}>A - Z</option>
        <option value="za" {% if sort == "za" %}selected{% endif %}>Z - A</option>
      </select>
      <div class="toolbar-dates">
        <span class="toolbar-label">From</span>
        <input type="month" name="from" class="toolbar-date"
               hx-get="/games" hx-trigger="change"
               hx-target="#games-grid" hx-swap="innerHTML"
               hx-include="[name='search'], [name='sort'], [name='to']"
               {% if let Some(f) = from %}value="{{ f }}"{% endif %}>
        <span class="toolbar-label">To</span>
        <input type="month" name="to" class="toolbar-date"
               hx-get="/games" hx-trigger="change"
               hx-target="#games-grid" hx-swap="innerHTML"
               hx-include="[name='search'], [name='sort'], [name='from']"
               {% if let Some(t) = to %}value="{{ t }}"{% endif %}>
      </div>
    </div>
  </div>
  <div id="games-grid" class="games-grid">
    {% include "games_grid.html" %}
  </div>
</div>
{% endblock %}
