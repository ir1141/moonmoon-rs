{% extends "base.html" %}

{% block title %}{{ vod_title }}{% endblock %}

{% block body_class %}watch-page{% endblock %}

{% block search %}{% endblock %}

{% block content %}
<div class="player-container">
  <div class="player-main">
    <div id="player-wrap">
      <div id="youtube-player"></div>
      <div id="player-fallback" class="player-fallback" role="status" aria-live="polite" hidden></div>
    </div>
    <div class="player-bar">
      <div class="player-info">
        <h2 class="player-title">{{ vod_title }}</h2>
        <div class="part-selector" id="part-selector"></div>
        <div class="chapter-selector" id="chapter-selector"></div>
        <button class="btn-chip theatre-btn" id="theatre-toggle" title="Theatre Mode (t)" aria-pressed="false">Theatre</button>
      </div>
    </div>
  </div>
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <span>Chat Replay</span>
      <div class="chat-controls">
        <button class="chat-size-btn" id="chat-size-down" title="Smaller text">-</button>
        <button class="chat-size-btn" id="chat-size-up" title="Larger text">+</button>
        <button class="chat-size-btn chat-timestamp-btn" id="chat-timestamp-toggle" title="Show timestamps" aria-label="Toggle timestamps" aria-pressed="false">T</button>
        <button class="chat-size-btn chat-collapse-btn" id="chat-collapse" type="button" title="Hide chat" aria-label="Hide chat" aria-expanded="true">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <span class="chat-status" id="chat-status" role="status" aria-live="polite"></span>
        <button class="chat-retry-btn" id="chat-retry" type="button" hidden>Retry</button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-paused" id="chat-paused" style="display:none">Chat Paused (scroll down to resume)</div>
  </div>
</div>

<div id="up-next-overlay" hidden>
  <div class="up-next-card">
    <div class="up-next-label">Up next</div>
    <div class="up-next-title" id="up-next-title"></div>
    <div class="up-next-countdown">Playing in <span id="up-next-seconds">10</span>s</div>
    <div class="up-next-actions">
      <button id="up-next-cancel" class="btn-chip" type="button">Cancel</button>
      <button id="up-next-play-now" class="btn-chip btn-primary" type="button">Play now</button>
    </div>
  </div>
</div>

<div id="vod-data" data-vod-id="{{ vod_id }}" data-youtube-parts="{{ youtube_parts_json }}" data-chapters="{{ chapters_json }}" data-total-secs="{{ total_secs }}" data-game-hint="{{ game_hint }}"></div>
<!-- SRI not used: Google serves a versionless URL whose contents change over time. -->
<script src="https://www.youtube.com/iframe_api" nonce="{{ nonce }}"></script>
<script type="module" src="/static/player.js" nonce="{{ nonce }}"></script>
{% endblock %}
